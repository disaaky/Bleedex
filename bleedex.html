<html lang="en" dir="ltr">
	<head>
		<meta charset="utf-8">
		<link rel="stylesheet" type="text/css" href="res/bx.css">	
		<title>Bleedex - Bleed calculator</title>

	<body>
	
		<form>
			<span>Type of project</span>

			<br>

		</form>

			console.log("Usage: type: single/double, size: a5, a4, letter, digest, width, height, bleed, spine")

			function n(type, size, width, height, bleed, spine)
			{
			
				function dunk(checkNum, min, max){
					
					if(checkNum < min || checkNum > max || !Number.isInteger(checkNum) ){
					return('invalid')
					}
				}
				
			dunk('m', 10, 20)
			
			 switch(size)

</script>
