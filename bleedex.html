<html lang="en" dir="ltr">
	<head>
		<meta charset="utf-8">
		<link rel="stylesheet" type="text/css" href="res/bx.css">	
		<title>Bleedex - Bleed calculator</title>
</head>
	
<body>
<!--
		<form>
			<span>Type of project ui</span>
			<br>
			<input type="radio" id="single" name="page" value="single">
			<label for="single">Single page</label>
			<br>
			<input type="radio" id="double" name="page" value="double">
			<label for="double">Double page/Cover</label>
			<br>
			<span>Size</span>
			<br>
			<input type="radio" id="a4" name="size" value="a4">
			<label for="a4">A4</label>
			<br>
			<input type="radio" id="a5" name="size" value="a5">
			<label for="a5">A5</label>
			<br>
			<input type="radio" id="letter" name="size" value="letter">
			<label for="letter">Letter</label>
			<br>
			<input type="radio" id="digest" name="size" value="digest">
			<label for="digest">Digest (half letter)</label>
			<br>
			<input type="radio" id="custom" name="size" value="custom">
			<label for="custom">Custom</label>
			<br>
			<label for="bleed">Bleed</label>
			<input id="bleed" name="bleed" type="text">
			<label for="spine">Spine</label>
			<input id="spine" name="spine" type="text">
			<br>
			<input type="submit" id="button">
		

		</form>
	-->
<script>
		
		
	console.log("Usage: type: single/double, size: a5, a4, letter, digest,  bleed, spine, width, height")
	console.log('n(single, a5, 0.5, 0)')

	function n(type, size, bleed, spine, width, height)
	{	
		//ask project size
		switch(size)
			{
				case 'a4':
					width = 210
					height = 297
					break;
				 
				case 'a5':
					width = 148
					height = 210
					break;
				
				case 'letter':
					width = 8.5
					height = 11
					break;
				 
				case 'digest':
					width = 5.5
					height = 8.5
					break;
					
				case 'custom':
					if(!numValid(width, 0, 100000)) return('Width is not a valid number');
					if(!numValid(height, 0, 100000)) return('Width is not a valid number');
					break;
				
				default:
					return ('invalid type')
				//check if custom width/height imput is valid

			}
		
		var bleedParse = numValid(bleed, 0, 100000);
		if(bleedParse === NaN) return('bleed is not a valid number')
		bleed = bleedParse;
		
		console.log(width)
		
		console.log('spine bef:' + spine)
			
		var spineParse = numValid(spine, 0, 100000)
		if(spineParse === NaN) return('spine is error')
		spine = spineParse;
		
	
			
		//check project type
		
	
		switch(type)
			{
				case 'double':
					width = width*2+bleed*2+spine
					height = height+2*bleed
					break;
					
				case 'single':
					width = width+2*bleed
					height = height+2*bleed
					
					console.log(width)
					break
					
				default:
					return('Please choose a valid type')
			}
			console.log('Width: ' + width)
			console.log('Height: ' + height)
	}
			
function numValid(checkNum, min, max)
	{	
		if(Number.parseFloat(checkNum)==false || checkNum < min || checkNum > max)
			{
				return(false);
			}
				return(Number.parseFloat(checkNum));
	}

</script>
		
		
		
	</body>

</html>
